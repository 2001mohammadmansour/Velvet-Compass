services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: velvet-compass-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: velvet-compass-back
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=HotelBookingDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=true;"
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: velvet-compass-front
    ports:
      - "3000:80"
    depends_on:
      - back

volumes:
  mssql_data: